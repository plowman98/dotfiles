name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"

      - name: Run pre-commit
        run: uvx pre-commit run --all-files
